name: Daily Horizon Summary

on:
  schedule:
    - cron: '17 7 * * *'
      timezone: 'Asia/Shanghai'
    - cron: '47 9 * * *'
      timezone: 'Asia/Shanghai'
  workflow_dispatch:      # Allow manual trigger

concurrency:
  group: horizon-daily-summary
  cancel-in-progress: false

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Shanghai
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout Horizon
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Check whether today's summary already exists
        id: daily_guard
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          SUMMARY_DATE="$(TZ=Asia/Shanghai date +'%Y-%m-%d')"
          GUARD_DIR="$RUNNER_TEMP/horizon-daily-guard"
          git clone --quiet --depth=1 \
            https://github.com/zhangjuntian787981-lab/Horizon-Daily.git \
            "$GUARD_DIR"
          if [[ -f "$GUARD_DIR/${SUMMARY_DATE} AI 信息日报.md" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Obsidian daily note ${SUMMARY_DATE} already exists; skipping."
          fi

      - name: Set up Python
        if: steps.daily_guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        if: steps.daily_guard.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.26"

      - name: Install dependencies
        if: steps.daily_guard.outputs.skip != 'true'
        run: uv sync

      - name: Prepare GitHub Actions config
        if: steps.daily_guard.outputs.skip != 'true'
        run: cp data/config.github.json data/config.json

      - name: Run Horizon
        if: steps.daily_guard.outputs.skip != 'true'
        env:
          # Map secrets to environment variables expected by config.json
          # Modify these based on your data/config.github.json provider settings
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          HORIZON_OBSIDIAN_OUTPUT_DIR: ${{ runner.temp }}/obsidian-output
        run: uv run horizon --hours 24

      - name: Set current date as environment variable
        if: steps.daily_guard.outputs.skip != 'true'
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        if: steps.daily_guard.outputs.skip != 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true

      - name: Checkout Obsidian daily repository for publish
        if: steps.daily_guard.outputs.skip != 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: zhangjuntian787981-lab/Horizon-Daily
          path: obsidian-daily
          ssh-key: ${{ secrets.OBSIDIAN_DAILY_DEPLOY_KEY }}

      - name: Commit Obsidian daily note
        if: steps.daily_guard.outputs.skip != 'true'
        run: |
          cp \
            "$RUNNER_TEMP/obsidian-output/${DATE} AI 信息日报.md" \
            "obsidian-daily/${DATE} AI 信息日报.md"
          uv run python -c \
            'from pathlib import Path; from src.storage.manager import StorageManager; StorageManager._save_obsidian_daily_index(Path("obsidian-daily"))'
          git -C obsidian-daily config user.name "github-actions[bot]"
          git -C obsidian-daily config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C obsidian-daily add -- "${DATE} AI 信息日报.md" "00-日报索引.md"
          if git -C obsidian-daily diff --cached --quiet; then
            echo "No Obsidian daily note changes to commit."
          else
            git -C obsidian-daily commit -m "Daily AI briefing: ${DATE}"
            git -C obsidian-daily push origin main
          fi
